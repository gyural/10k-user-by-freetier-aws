version: '3.8'

services:

  redis:
    image: redis
    platform: linux/amd64
    restart: always
    ports:
      - "6379:6379"
  db:
    image: mysql
    platform: linux/amd64
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: parking
      MYSQL_USER: user
      MYSQL_PASSWORD: 1234
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  backend:
    container_name: honorsParking
    depends_on:
      - db
      - redis
    platform: linux/amd64
    #    platform: linux/arm64
    build: .
    ports:
      - "8080:8080"
    environment:
      db-url: jdbc:mysql://db:3306/parking
      db-username: user
      db-password: 1234
      redis-host: redis
      redis-port: 6379
      SPRING_PROFILES_ACTIVE: performanceTest

volumes:
  mysql-data: