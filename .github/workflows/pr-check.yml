name: Test for CI In PR

on:
  pull_request:
    branches:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: PR 브랜치 체크아웃
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: 현재 브랜치 출력
        run: |
          echo "GitHub 환경변수 기준 브랜치: ${{ github.head_ref }}"
          echo "Git 명령어 기준 브랜치: $(git rev-parse --abbrev-ref HEAD)"

      # Github Actions에 빌드, 테스트 할 때 필요한 JDK 설치
      - name: JDK 21 설치
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # application.yml 파일 생성
      - name: application.yml 파일 만들기
        run: |
          mkdir -p ./src/main/resources/config
          echo "${{ secrets.APPLICATION_YML }}" > ./src/main/resources/config/application.yml

      # ✅ 루트에 config import용 application.yml 생성 (cicd 테스트 통과용)
      - name: application.yml import용 루트 파일 만들기
        run: |
          mkdir -p ./src/main/resources
          echo -e "spring:\n  config:\n    import: \"config/application.yml\"" > ./src/main/resources/application.yml

      # application.properties 파일 생성
      - name: application.properties 파일 만들기
        run: |
          mkdir -p ./src/main/resources/config
          echo "${{ secrets.APPLICATION_PROPERTIES }}" > ./src/main/resources/config/application.properties
      # 빌드
      - name: 테스트 및 빌드하기
        run: ./gradlew clean build --refresh-dependencies
  check-branch-up-to-date:
    runs-on: ubuntu-latest
    steps:
      - name: Repository Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 전체 히스토리를 가져와야 merge-base 체크 가능

      - name: Checkout PR branch
        run: |
          # PR 브랜치로 체크아웃
          git checkout $GITHUB_HEAD_REF
          echo "✅ PR 브랜치로 체크아웃 완료: $GITHUB_HEAD_REF"

      - name: Check if branch is up to date with develop
        run: |
          git fetch origin develop
          BASE_COMMIT=$(git merge-base HEAD origin/develop)
          LATEST_COMMIT=$(git rev-parse origin/develop)

          echo "🔍 BASE_COMMIT: $BASE_COMMIT"
          echo "🔍 LATEST_COMMIT: $LATEST_COMMIT"

          if [ "$BASE_COMMIT" != "$LATEST_COMMIT" ]; then
            echo "❌ PR이 최신 develop 브랜치를 포함하고 있지 않습니다."
            echo "PR을 업데이트하세요: git merge origin/develop"
            exit 1
          fi

          echo "✅ PR이 최신 develop 브랜치를 포함하고 있습니다."